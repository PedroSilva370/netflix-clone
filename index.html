<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Quem está assistindo?</h1>
        <p>Selecione seu perfil para continuar</p>
        <button id="themeToggle" aria-label="Alternar tema">Modo Claro</button>
    </header>

    <main>
        <section aria-label="Perfis de usuário" class="profiles">
            <ul>
                <li class="profile">
                    <a href="catalogo/catalogo.html" data-nome="Gustavo" data-img="/assets/Gemini_Generated_Image_bcz1ygbcz1ygbcz1.png">
                        <figure>
                            <img src="/assets/Gemini_Generated_Image_bcz1ygbcz1ygbcz1.png" alt="Imagem de um cavaleiro">
                            <figcaption>Gustavo</figcaption>
                        </figure>
                    </a>
                </li>

                <li class="profile">
                    <a href="catalogo/catalogo.html" data-nome="Arthur" data-img="assets/Hero in glowing armor and cape.png">
                        <figure>
                            <img src="assets/Hero in glowing armor and cape.png" alt="Imagem de um herói">
                            <figcaption>Arthur</figcaption>
                        </figure>
                    </a>
                </li>

                <li class="profile">
                    <a href="catalogo/catalogo.html" data-nome="Carro" data-img="assets/Futuristic sports car in neon glow.png">
                        <figure>
                            <img src="assets/Futuristic sports car in neon glow.png" alt="Imagem de um carro">
                            <figcaption>Carro</figcaption>
                        </figure>
                    </a>
                </li>

                <li class="profile">
                    <a href="catalogo/catalogo.html" data-nome="Thiago" data-img="/assets/2.png">
                        <figure>
                            <img src="/assets/2.png" alt="Imagem de um homem gentil">
                            <figcaption>Thiago</figcaption>
                        </figure>
                    </a>
                </li>
            </ul>
        </section>
    </main>

    <script src="theme.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
